<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>论文格式化工具</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        color: #222;
      }
      .card {
        max-width: 520px;
        margin: 80px auto;
        background: #fff;
        padding: 24px;
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
        font-size: 22px;
      }
      .hint {
        color: #666;
        margin-bottom: 16px;
      }
      .row {
        margin-bottom: 12px;
      }
      button {
        background: #1663ff;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 10px 16px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #status {
        margin-top: 12px;
        min-height: 20px;
      }
      .report {
        margin-top: 16px;
        padding: 12px 14px;
        background: #f7f9ff;
        border: 1px solid #dce5ff;
        border-radius: 8px;
      }
      .report h2 {
        margin: 0 0 8px;
        font-size: 16px;
      }
      .report ul {
        margin: 0;
        padding-left: 18px;
      }
      .report li {
        margin: 4px 0;
      }
      .doc {
        margin-top: 16px;
        padding: 12px 14px;
        background: #fffaf0;
        border: 1px solid #ffe2a8;
        border-radius: 8px;
      }
      .doc h2 {
        margin: 0 0 8px;
        font-size: 16px;
      }
      .doc ul {
        margin: 0;
        padding-left: 18px;
      }
      .doc li {
        margin: 4px 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>DOCX 论文格式化</h1>
      <div class="hint">上传 Word 文档，处理完成后会自动下载。</div>
      <div class="row">
        <input id="fileInput" type="file" accept=".docx" />
      </div>
      <button id="submitBtn">上传并格式化</button>
      <div id="status"></div>
      <div class="doc">
        <h2>格式化说明（打开页面即可查看）</h2>
        <ul>
          <li>封面、声明、摘要、目录不做处理</li>
          <li>统一正文、一级/二级/三级标题的字体、字号、行距、对齐方式。</li>
          <li>识别并规范“引言、结语、参考文献、致谢”等章节标题。</li>
          <li>自动处理标题前后空行规则（不同级别标题规则不同）。</li>
          <li>识别图题（如“图1 ...”）并按图题样式居中格式化。</li>
          <li>统一参考文献段落格式，设置悬挂缩进等规则。</li>
          <li>统一页面页边距，并从引言处开始设置页码格式。</li>
          <li>不改变你原始上传文件，只生成格式化后的新文件下载。</li>
        </ul>
      </div>
      <div id="report" class="report" style="display: none">
        <h2>本次处理统计（处理后）</h2>
        <ul id="reportList"></ul>
      </div>
    </div>

    <script>
      const submitBtn = document.getElementById("submitBtn");
      const fileInput = document.getElementById("fileInput");
      const statusEl = document.getElementById("status");
      const reportEl = document.getElementById("report");
      const reportListEl = document.getElementById("reportList");

      function renderReport(report) {
        if (!report) {
          reportEl.style.display = "none";
          return;
        }
        const landmarks = Array.isArray(report.landmarks) && report.landmarks.length
          ? report.landmarks.join("、")
          : "未检测到";
        const items = [
          `文档总段落数：${report.total_paragraphs || 0}`,
          `识别到的关键章节：${landmarks}`,
          `处理的章节标题（引言/结语/参考文献/致谢）：${report.section_titles || 0}`,
          `处理的正文标题段（1-3级）：${report.body_titles || 0}`,
          `处理的正文段落：${report.body_text || 0}`,
          `处理的图题段落：${report.figure_captions || 0}`,
          `处理的参考文献段落：${report.references_text || 0}`,
          `处理的致谢段落：${report.acknowledgment_text || 0}`,
          `更新页边距的节数：${report.margins_updated || 0}`,
          `更新页码的节数：${report.page_numbers_updated || 0}`,
        ];
        reportListEl.innerHTML = items.map((item) => `<li>${item}</li>`).join("");
        reportEl.style.display = "block";
      }

      function decodeBase64ToBlob(base64Data) {
        const binaryString = atob(base64Data);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i += 1) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        return new Blob([bytes], {
          type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
        });
      }

      submitBtn.addEventListener("click", async () => {
        const file = fileInput.files[0];
        if (!file) {
          statusEl.textContent = "请先选择一个 .docx 文件。";
          return;
        }

        submitBtn.disabled = true;
        statusEl.textContent = "处理中，请稍候...";
        reportEl.style.display = "none";

        try {
          const formData = new FormData();
          formData.append("file", file);

          const response = await fetch("/api/format", {
            method: "POST",
            body: formData,
          });

          if (!response.ok) {
            let message = "处理失败";
            try {
              const data = await response.json();
              message = data.error || message;
            } catch (e) {}
            throw new Error(message);
          }

          const data = await response.json();
          if (!data.file_base64) {
            throw new Error("服务端未返回格式化文件");
          }
          renderReport(data.report);

          const blob = decodeBase64ToBlob(data.file_base64);
          const url = window.URL.createObjectURL(blob);
          const fileName = data.download_name || "formatted.docx";

          const a = document.createElement("a");
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(url);

          statusEl.textContent = "处理完成，已开始下载。";
        } catch (error) {
          statusEl.textContent = `出错：${error.message}`;
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
